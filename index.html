<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* BACKGROUND */
body {
    background: linear-gradient(to right, #4e54c8, #8f94fb);
    color: white;
}

/* NAVBAR (TOP LEFT + FIXED) */
nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #1a1a40;
    padding: 15px 20px;
    display: flex;
    justify-content: flex-start;
    gap: 20px;
    z-index: 1000;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    cursor: pointer;
}

nav a:hover {
    color: #b3b7ff;
}

/* PAGES (FULL WIDTH NOW) */
.page {
    display: none;
    min-height: 100vh;
    padding: 100px 40px 40px;
    text-align: center;
}

/* ACTIVE PAGE */
.active {
    display: block;
}

/* IMAGE */
img {
    width: 300px;
    border-radius: 10px;
    margin-top: 15px;
}

/* VIDEO */
iframe {
    margin-top: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a onclick="showPage('about')">About Me</a>
    <a onclick="showPage('certificates')">My Certificates</a>
    <a onclick="showPage('hobbies')">My Hobbies</a>
    <a onclick="showPage('video')">Video</a>
</nav>

<!-- ABOUT PAGE -->
<div id="about" class="page active">
    <h1>About Me</h1>
    <p>helu</p>
</div>

<!-- CERTIFICATES PAGE -->
<div id="certificates" class="page">
    <h1>My Certificates</h1>
    <p>Here is my certificate:</p>

    <!-- PUT YOUR CERTIFICATE IMAGE HERE -->
    <img src="https://via.placeholder.com/300x200" alt="Certificate">
</div>

<!-- HOBBIES PAGE -->
<div id="hobbies" class="page">
    <h1>My Hobbies</h1>
    <p>My hobbies include playing baseball and Mobile Legends.</p>

    <img src="Messenger_creation_AAF1B893-CC8F-4360-8D8A-58CB691CD888.jpeg">
    <h3>This is my Baseball team</h3>
</div>

<!-- VIDEO PAGE -->
<div id="video" class="page">
    <h1>Baseball Video</h1>

    <iframe width="500" height="300"
        src="https://www.youtube.com/embed/E160D9rEY0M"
        allowfullscreen>
    </iframe>
</div>

<!-- JAVASCRIPT -->
<script>
function showPage(pageId) {
    var pages = document.querySelectorAll('.page');
    pages.forEach(function(page) {
        page.classList.remove('active');
    });

    document.getElementById(pageId).classList.add('active');
}
</script>

</body>
</html>
